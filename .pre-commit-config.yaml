# Pre-commit hooks for LinuxForHealth X12.
# Install with: pre-commit install
# Run on all files with: pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # lint (auto-fixing what it safely can)
      - id: ruff
        args: [--fix]
      # format
      - id: ruff-format
  # ty type check, using the pinned `ty` from the dev environment so the version
  # matches the CI gate (avoids drift from this preview tool).
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty check src/linuxforhealth
        language: system
        pass_filenames: false
        types: [python]
