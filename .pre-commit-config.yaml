# Pre-commit hooks for LinuxForHealth X12.
# Install with: pre-commit install
# Run on all files with: pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # lint (auto-fixing what it safely can)
      - id: ruff
        args: [--fix]
      # format
      - id: ruff-format
